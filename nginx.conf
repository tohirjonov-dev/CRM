upstream app_backends {
    least_conn;
    server backend:8000;
}

server {
    listen 80;
    server_name hamidulloh.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name hamidulloh.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/hamidulloh.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hamidulloh.duckdns.org/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /api/ {
        proxy_pass http://app_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
