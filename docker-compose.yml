services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: apparel_user
      POSTGRES_PASSWORD: apparel_password
      POSTGRES_DB: apparel_cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apparel_user -d apparel_cloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://apparel_user:apparel_password@postgres:5432/apparel_cloud
      SECRET_KEY: e8f96bc8e6cd7c0e5a95b871c504bd9feab8d7c67bf309adbd500473a216db8c
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: "https://hamidulloh.duckdns.org"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_URL: https://hamidulloh.duckdns.org
    volumes:
      - ./frontend:/app
      - frontend_dist:/usr/share/nginx/html
    command: sh -c "npm install && npm run build && cp -r dist/* /usr/share/nginx/html && while true; do sleep 3600; done"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt/live/hamidulloh.duckdns.org:ro

volumes:
  postgres_data:
  frontend_dist:
