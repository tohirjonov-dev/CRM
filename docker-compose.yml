services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: apparel_user
      POSTGRES_PASSWORD: apparel_password
      POSTGRES_DB: apparel_cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apparel_user -d apparel_cloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/hamidulloh/apparelcloud/backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://apparel_user:apparel_password@postgres:5432/apparel_cloud
      SECRET_KEY: e8f96bc8e6cd7c0e5a95b871c504bd9feab8d7c67bf309adbd500473a216db8c
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: "https://hamidulloh.duckdns.org"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ghcr.io/hamidulloh/apparelcloud/frontend:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt/live/hamidulloh.duckdns.org:ro

volumes:
  postgres_data:
